name: Frontend CI

# Пайплайн будет запускаться при каждом пуше в ветки main и full
on:
  push:
    branches: [ "main", "full" ]
  pull_request:
    branches: [ "main", "full" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код репозитория на виртуальную машину GitHub
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Устанавливаем Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-node: '20' # ставим стабильную 20-ю версию
        cache: 'npm'    # кэшируем зависимости для быстрой сборки

    # 3. Устанавливаем пакеты из package.json
    - name: Install dependencies
      run: npm ci

    # 4. Запускаем проверку кода (ESLint), так как у вас есть eslint.config.js
    - name: Run linter
      run: npm run lint --if-present

    # 5. Собираем проект (если в package.json настроен скрипт build)
    - name: Build project
      run: npm run build --if-present
